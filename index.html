<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMSA — Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0d1117;font-family:'DM Sans',system-ui,sans-serif;color:#e8eaf0}
/* AUTH */
#auth-wall{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#161b22;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:40px;width:320px;text-align:center}
.login-box h1{font-size:26px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:12px;color:#7a7f94;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#e8eaf0;font-size:14px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px}
.login-box input:focus{border-color:#2e74b5}
.login-box button{width:100%;padding:11px;border-radius:8px;background:#2e74b5;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer}
.login-err{font-size:12px;color:#e05a5a;margin-top:8px;min-height:16px}
/* LAYOUT */
header{background:#161b22;border-bottom:1px solid rgba(255,255,255,.08);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.h-logo{font-size:18px;font-weight:700;color:#e8eaf0}
.h-sub{font-size:12px;color:#7a7f94;margin-left:8px}
.h-right{display:flex;align-items:center;gap:12px}
.btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-pri{background:#2e74b5;color:#fff}.btn-pri:hover{background:#2563a0}
.btn-sec{background:rgba(255,255,255,.08);color:#e8eaf0}.btn-sec:hover{background:rgba(255,255,255,.13)}
.btn-red{background:rgba(201,74,74,.2);color:#e05a5a;border:1px solid rgba(201,74,74,.3)}.btn-red:hover{background:rgba(201,74,74,.3)}
.btn-sm{padding:4px 10px;font-size:11px}
main{padding:28px 32px;max-width:1100px}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:24px}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;color:#7a7f94;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif}
.tab-btn.on{color:#e8eaf0;border-bottom-color:#2e74b5}
/* CARDS */
.card{background:#161b22;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:#e8eaf0;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#0d1117;padding:9px 12px;text-align:left;font-size:11px;color:#7a7f94;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
/* FORM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-bg.show{display:flex}
.modal{background:#161b22;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:28px;width:480px;max-width:95vw}
.modal h2{font-size:16px;font-weight:600;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:#7a7f94;margin-bottom:5px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:9px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:#0d1117;color:#e8eaf0;font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.form-row input:focus,.form-row select:focus{border-color:#2e74b5}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* PERM MATRIX */
.perm-matrix{overflow-x:auto}
.perm-table{border-collapse:collapse;font-size:12px;min-width:700px}
.perm-table th,.perm-table td{padding:8px 12px;border:1px solid rgba(255,255,255,.07);text-align:center;vertical-align:middle}
.perm-table th{background:#0d1117;color:#7a7f94;font-weight:500}
.perm-table td:first-child{text-align:left;font-weight:500;background:#0d1117;color:#e8eaf0}
.chk-wrap{display:flex;flex-direction:column;gap:4px;align-items:center}
.chk-wrap input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#2e74b5}
.chk-label{font-size:10px;color:#7a7f94}
/* STATUS */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-on{background:rgba(29,158,117,.2);color:#1d9e75;border:1px solid rgba(29,158,117,.3)}
.badge-off{background:rgba(201,74,74,.15);color:#e05a5a;border:1px solid rgba(201,74,74,.3)}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1d9e75;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;display:none;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* SYNC STATUS */
.sync-bar{background:rgba(46,116,181,.1);border:1px solid rgba(46,116,181,.2);border-radius:8px;padding:10px 16px;margin-bottom:18px;font-size:12px;color:#7a7f94;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1d9e75;flex-shrink:0}
.sync-dot.loading{background:#d4890f;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<!-- AUTH WALL -->
<div id="auth-wall">
  <div class="login-box">
    <h1>EMSA Admin</h1>
    <p>Acceso restringido a administradores</p>
    <input type="password" id="admin-pwd" placeholder="Clave admin"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MODAL USUARIO -->
<div class="modal-bg" id="modal-user">
  <div class="modal">
    <h2 id="modal-user-title">Nuevo usuario</h2>
    <div class="form-row"><label>Usuario (login)</label><input id="f-user" placeholder="ej: gerencia"></div>
    <div class="form-row"><label>Nombre completo</label><input id="f-nombre" placeholder="ej: Juan Perez"></div>
    <div class="form-row"><label>Clave</label><input id="f-clave" type="text" placeholder="ej: Clave2026"></div>
    <div class="form-row"><label>Estado</label>
      <select id="f-activo"><option value="SI">Activo</option><option value="NO">Inactivo</option></select>
    </div>
    <div class="login-err" id="modal-user-err"></div>
    <div class="form-actions">
      <button class="btn btn-sec" onclick="closeModal('modal-user')">Cancelar</button>
      <button class="btn btn-pri" onclick="saveUser()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL PERMISOS -->
<div class="modal-bg" id="modal-perms">
  <div class="modal" style="width:600px;max-width:95vw">
    <h2>Permisos de <span id="perm-user-label" style="color:#3b8fd4"></span></h2>
    <div id="perm-content" style="overflow-y:auto;max-height:60vh"></div>
    <div class="form-actions">
      <button class="btn btn-sec" onclick="closeModal('modal-perms')">Cancelar</button>
      <button class="btn btn-pri" onclick="savePerms()">Guardar permisos</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<header>
  <div style="display:flex;align-items:center">
    <span class="h-logo">EMSA</span>
    <span class="h-sub">Administrador de Accesos</span>
  </div>
  <div class="h-right">
    <span id="sync-status" style="font-size:12px;color:#7a7f94"></span>
    <button class="btn btn-pri" onclick="showTab('usuarios')">Usuarios</button>
    <button class="btn btn-sec" onclick="showTab('permisos')">Matriz permisos</button>
  </div>
</header>

<main>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-msg">Conectando con Google Sheets...</span>
  </div>

  <!-- TAB USUARIOS -->
  <div id="tab-usuarios">
    <div class="card">
      <div class="card-title">
        <span>Usuarios registrados</span>
        <button class="btn btn-pri btn-sm" onclick="openNewUser()">+ Nuevo usuario</button>
      </div>
      <table>
        <thead><tr><th>Usuario</th><th>Nombre</th><th>Clave</th><th>Estado</th><th>Dashboards</th><th>Acciones</th></tr></thead>
        <tbody id="tbl-users"></tbody>
      </table>
    </div>
  </div>

  <!-- TAB PERMISOS -->
  <div id="tab-permisos" style="display:none">
    <div class="card">
      <div class="card-title">Matriz de permisos por dashboard y pestanas</div>
      <div class="perm-matrix" id="matriz-perms"></div>
    </div>
  </div>
</main>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const ADMIN_PWD  = 'LuisSilvaEMSA';
const API_KEY    = 'AIzaSyCXaM0fXC-6H-Pz22uRTv52uMe3xtIoLkU';
const SID_USERS  = '1dwkZj1-FH3IfVAeHh70R45FgkKPWykruEFqUwQTH-z0'; // se reemplaza al crear el Sheet

// Definicion de dashboards y sus pestanas
const DASHBOARDS = {
  'emsa-proveedores': { label:'CxP', color:'#2e74b5',
    tabs:['Buscar proveedor','Resumen general','Historico','Libro Compras'] },
  'emsa-clientes': { label:'CxC', color:'#1d9e75',
    tabs:['Buscar cliente','Resumen general','Historico','Libro de Ventas'] },
  'emsa-ventas': { label:'Ventas', color:'#2e74b5',
    tabs:['Total consolidado','Por categoria','Comparativo anual','Sabor y Formato','Evolucion detallada','Prod vs Ventas'] },
  'emsa-stock': { label:'Stock', color:'#9b6dd4',
    tabs:['Stock actual','Por bodega','Busqueda productos','Historico','Consumos MP'] },
  'emsa-home': { label:'Home TV', color:'#1d9e75',
    tabs:['Acceso completo'] },
};

// ── ESTADO ─────────────────────────────────────────────────
let users    = [];   // [{USUARIO, CLAVE, NOMBRE, ACTIVO}]
let permisos = [];   // [{USUARIO, DASHBOARD, PESTANAS}]
let editUser = null; // usuario en edicion

// ── AUTH ───────────────────────────────────────────────────
function doLogin(){
  const v=document.getElementById('admin-pwd').value;
  if(v===ADMIN_PWD){
    document.getElementById('auth-wall').style.display='none';
    loadData();
  } else {
    document.getElementById('login-err').textContent='Clave incorrecta';
    document.getElementById('admin-pwd').value='';
  }
}
document.getElementById('admin-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── GOOGLE SHEETS ──────────────────────────────────────────
async function fetchTab(tab){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SID_USERS}/values/${tab}!A:Z?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status+' — '+tab);
  const d=await r.json(), rows=d.values||[];
  if(rows.length<2) return [];
  const h=rows[0];
  return rows.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]??'');return o;});
}

async function writeTab(tab, data){
  // Escritura via gspread no disponible desde browser — usar Apps Script endpoint
  // Por ahora mostrar instrucciones para actualizar manualmente
  return false;
}

async function loadData(){
  const dot=document.getElementById('sync-dot');
  const msg=document.getElementById('sync-msg');
  dot.className='sync-dot loading';
  msg.textContent='Cargando usuarios y permisos...';
  try {
    [users, permisos] = await Promise.all([
      fetchTab('usuarios'),
      fetchTab('permisos')
    ]);
    dot.className='sync-dot';
    msg.textContent=`${users.length} usuarios · ${permisos.length} registros de permisos · Ultimo refresh: ${new Date().toLocaleTimeString('es-CL')}`;
    renderUsers();
    renderMatriz();
  } catch(e){
    dot.className='sync-dot';
    dot.style.background='#e05a5a';
    msg.textContent='Error al cargar: '+e.message+' — Verificar Sheet ID y permisos publicos';
  }
}

// ── TABS ───────────────────────────────────────────────────
function showTab(t){
  document.getElementById('tab-usuarios').style.display=t==='usuarios'?'block':'none';
  document.getElementById('tab-permisos').style.display=t==='permisos'?'block':'none';
}

// ── RENDER USUARIOS ────────────────────────────────────────
function renderUsers(){
  const tb=document.getElementById('tbl-users');
  if(!users.length){
    tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:20px;color:#7a7f94">Sin usuarios registrados. Agregar filas en el Sheet.</td></tr>';
    return;
  }
  tb.innerHTML=users.map((u,i)=>{
    const permsU=permisos.filter(p=>p.USUARIO===u.USUARIO);
    const dbs=permsU.length===0?'<span style="color:#7a7f94">Sin permisos</span>'
      : permsU.map(p=>`<span style="background:${(DASHBOARDS[p.DASHBOARD]?.color||'#444')}33;color:${DASHBOARDS[p.DASHBOARD]?.color||'#aaa'};padding:2px 7px;border-radius:4px;font-size:11px;margin-right:3px">${DASHBOARDS[p.DASHBOARD]?.label||p.DASHBOARD}</span>`).join('');
    return `<tr>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:13px">${u.USUARIO}</span></td>
      <td>${u.NOMBRE||'—'}</td>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#7a7f94">${u.CLAVE||'—'}</span></td>
      <td><span class="badge ${u.ACTIVO==='SI'?'badge-on':'badge-off'}">${u.ACTIVO==='SI'?'Activo':'Inactivo'}</span></td>
      <td>${dbs}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-sec btn-sm" onclick="openEditUser(${i})">Editar</button>
        <button class="btn btn-sec btn-sm" onclick="openPerms('${u.USUARIO}')">Permisos</button>
      </td>
    </tr>`;
  }).join('');
}

// ── MODAL USUARIO ──────────────────────────────────────────
function openNewUser(){
  editUser=null;
  document.getElementById('modal-user-title').textContent='Nuevo usuario';
  document.getElementById('f-user').value='';
  document.getElementById('f-nombre').value='';
  document.getElementById('f-clave').value='';
  document.getElementById('f-activo').value='SI';
  document.getElementById('f-user').disabled=false;
  document.getElementById('modal-user-err').textContent='';
  document.getElementById('modal-user').classList.add('show');
}
function openEditUser(i){
  editUser=i;
  const u=users[i];
  document.getElementById('modal-user-title').textContent='Editar usuario';
  document.getElementById('f-user').value=u.USUARIO;
  document.getElementById('f-nombre').value=u.NOMBRE||'';
  document.getElementById('f-clave').value=u.CLAVE||'';
  document.getElementById('f-activo').value=u.ACTIVO||'SI';
  document.getElementById('f-user').disabled=true;
  document.getElementById('modal-user-err').textContent='';
  document.getElementById('modal-user').classList.add('show');
}
function saveUser(){
  const u=document.getElementById('f-user').value.trim().toLowerCase();
  const n=document.getElementById('f-nombre').value.trim();
  const c=document.getElementById('f-clave').value.trim();
  const a=document.getElementById('f-activo').value;
  if(!u||!c){document.getElementById('modal-user-err').textContent='Usuario y clave son requeridos';return;}
  if(editUser===null){
    if(users.find(x=>x.USUARIO===u)){document.getElementById('modal-user-err').textContent='Ya existe ese usuario';return;}
    users.push({USUARIO:u,NOMBRE:n,CLAVE:c,ACTIVO:a});
  } else {
    users[editUser]={...users[editUser],NOMBRE:n,CLAVE:c,ACTIVO:a};
  }
  closeModal('modal-user');
  renderUsers();
  showSaveInstructions();
}

// ── MODAL PERMISOS ─────────────────────────────────────────
let permEditUser='';
function openPerms(usuario){
  permEditUser=usuario;
  document.getElementById('perm-user-label').textContent=usuario;
  const permsU=permisos.filter(p=>p.USUARIO===usuario);

  let html='<div style="display:flex;flex-direction:column;gap:12px">';
  Object.entries(DASHBOARDS).forEach(([dbId,db])=>{
    const permRow=permsU.find(p=>p.DASHBOARD===dbId||p.DASHBOARD==='*');
    const hasAccess=!!permRow;
    const permTabs=permRow?.PESTANAS||'';
    const allTabs=permTabs==='*'||permTabs==='';

    html+=`<div style="background:#0d1117;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <input type="checkbox" id="db-${dbId}" ${hasAccess?'checked':''} onchange="toggleDbAccess('${dbId}',this.checked)"
          style="width:16px;height:16px;accent-color:${db.color};cursor:pointer">
        <label for="db-${dbId}" style="font-size:14px;font-weight:600;color:${db.color};cursor:pointer">${db.label}</label>
        <span style="font-size:11px;color:#4a5068">${dbId}</span>
      </div>
      <div id="tabs-${dbId}" style="display:${hasAccess?'flex':'none'};flex-wrap:wrap;gap:8px;padding-left:26px">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="all-${dbId}" ${allTabs?'checked':''} onchange="toggleAllTabs('${dbId}',this.checked)"
            style="accent-color:${db.color}">
          <span style="color:#e8eaf0;font-weight:500">Todas las pestanas</span>
        </label>
        ${db.tabs.map(t=>{
          const tabId='tab-cb-'+dbId+'-'+t.replace(/[^a-z0-9]/gi,'_');
          const checked=allTabs||permTabs.split(',').map(x=>x.trim()).includes(t);
          return `<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
            <input type="checkbox" id="${tabId}" ${checked?'checked':''} class="tab-cb-${dbId}"
              style="accent-color:${db.color}">
            <span style="color:#9aa0b4">${t}</span>
          </label>`;
        }).join('')}
      </div>
    </div>`;
  });
  html+='</div>';

  document.getElementById('perm-content').innerHTML=html;
  document.getElementById('modal-perms').classList.add('show');
}

function toggleDbAccess(dbId, checked){
  document.getElementById('tabs-'+dbId).style.display=checked?'flex':'none';
}
function toggleAllTabs(dbId, checked){
  document.querySelectorAll('.tab-cb-'+dbId).forEach(cb=>cb.checked=checked);
}

function savePerms(){
  // Quitar permisos existentes del usuario
  permisos=permisos.filter(p=>p.USUARIO!==permEditUser);
  // Agregar nuevos
  Object.keys(DASHBOARDS).forEach(dbId=>{
    const hasAccess=document.getElementById('db-'+dbId)?.checked;
    if(!hasAccess) return;
    const allTabs=document.getElementById('all-'+dbId)?.checked;
    let tabs='*';
    if(!allTabs){
      const sel=[...document.querySelectorAll('.tab-cb-'+dbId)]
        .filter(cb=>cb.checked).map(cb=>cb.nextElementSibling?.textContent?.trim()).filter(Boolean);
      tabs=sel.length?sel.join(','):'*';
    }
    permisos.push({USUARIO:permEditUser,DASHBOARD:dbId,PESTANAS:tabs});
  });
  closeModal('modal-perms');
  renderUsers();
  renderMatriz();
  showSaveInstructions();
}

// ── RENDER MATRIZ ──────────────────────────────────────────
function renderMatriz(){
  const el=document.getElementById('matriz-perms');
  if(!users.length){el.innerHTML='<p style="color:#7a7f94;font-size:13px">Sin usuarios aun.</p>';return;}

  let html='<table class="perm-table"><thead><tr><th>Usuario</th>';
  Object.entries(DASHBOARDS).forEach(([id,db])=>{
    html+=`<th style="color:${db.color}">${db.label}</th>`;
  });
  html+='</tr></thead><tbody>';

  users.forEach(u=>{
    html+=`<tr><td>${u.USUARIO}<br><span style="font-size:10px;color:#7a7f94">${u.NOMBRE||''}</span></td>`;
    Object.entries(DASHBOARDS).forEach(([dbId,db])=>{
      const p=permisos.find(p=>p.USUARIO===u.USUARIO&&(p.DASHBOARD===dbId||p.DASHBOARD==='*'));
      if(!p){
        html+='<td><span style="color:#4a5068;font-size:18px">&#8212;</span></td>';
      } else if(p.PESTANAS==='*'){
        html+=`<td><span style="color:${db.color};font-size:18px">&#10003;</span><br><span style="font-size:10px;color:#4a5068">Total</span></td>`;
      } else {
        const n=p.PESTANAS.split(',').length;
        html+=`<td><span style="color:${db.color};font-size:18px">&#9711;</span><br><span style="font-size:10px;color:#7a7f94">${n} pests.</span></td>`;
      }
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
}

// ── INSTRUCCIONES GUARDAR ──────────────────────────────────
function showSaveInstructions(){
  // Generar CSV para pegar en Sheet
  const usersCSV=['USUARIO,CLAVE,NOMBRE,ACTIVO',...users.map(u=>`${u.USUARIO},${u.CLAVE},${u.NOMBRE||''},${u.ACTIVO}`)].join('\n');
  const permsCSV=['USUARIO,DASHBOARD,PESTANAS',...permisos.map(p=>`${p.USUARIO},${p.DASHBOARD},${p.PESTANAS}`)].join('\n');

  // Copiar al portapapeles
  const full=`=== PESTAÑA: usuarios ===\n${usersCSV}\n\n=== PESTAÑA: permisos ===\n${permsCSV}`;
  navigator.clipboard.writeText(full).then(()=>{
    toast('Datos copiados al portapapeles. Pegar en el Sheet EMSA_Usuarios.');
  }).catch(()=>{
    // Mostrar en textarea si no hay clipboard
    const w=window.open('','_blank','width=600,height=400');
    w.document.write('<pre style="font-family:monospace;font-size:12px;padding:20px">'+full+'</pre>');
  });
}

function copySheetData(){
  showSaveInstructions();
}

// ── UTILS ──────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.remove('show');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}

// Init
showTab('usuarios');
</script>
